<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cijferend Optellen en Aftrekken met Kommagetallen</title>
    <style>
    :root {
    --primary-color: #2196F3;
    --secondary-color: #FFC107;
    --success-color: #4CAF50;
    --error-color: #F44336;
    --bg-color: #f0f2f5;
    --grid-border: #999;
    
    /* Kolom Kleuren */
    --color-E: rgba(255, 235, 59, 0.15);    /* Geel (Eenheden) */
    --color-T: rgba(76, 175, 80, 0.15);     /* Groen (Tientallen) */
    --color-H: rgba(33, 150, 243, 0.15);    /* Blauw (Honderdtallen) */
    --color-D: rgba(244, 67, 54, 0.15);     /* Rood (Duizendtallen) */
    --color-t: rgba(156, 39, 176, 0.12);    /* Paars (Tienden) */
    --color-h: rgba(233, 30, 99, 0.12);     /* Roze (Honderdsten) */
    }

    body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg-color);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    }

    .container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 700px;
    text-align: center;
    }

    h1 { color: #333; margin-bottom: 20px; font-size: 1.5rem; }

    /* Hartjes & Niveau Progressie */
    #progressContainer {
    display: none;
    flex-direction: column;
    align-items: center;
    margin-bottom: 20px;
    gap: 5px;
    }

    #niveauLabel {
    font-size: 0.9rem;
    font-weight: bold;
    color: #666;
    background: #eee;
    padding: 4px 12px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    }

    #progressSectie {
    display: flex;
    justify-content: center;
    gap: 10px;
    font-size: 2rem;
    }
    .heart { color: #ccc; transition: color 0.3s; }
    .heart.filled { color: #e91e63; }

    /* Menu Stijl */
    #menuSectie, #eindSectie {
    display: flex;
    flex-direction: column;
    gap: 10px;
    }

    #eindSectie { display: none; }

    .menu-btn {
    padding: 15px;
    font-size: 1rem;
    background: white;
    border: 2px solid var(--primary-color);
    color: var(--primary-color);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    }

    .menu-btn:hover {
    background: var(--primary-color);
    color: white;
    }

    /* Opgave Stijl */
    #oefeningSectie { display: none; }

    .opgave-box {
    background: #e3f2fd;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 25px;
    border: 2px dashed var(--primary-color);
    }

    .instruction {
    font-size: 1rem;
    color: #555;
    margin-bottom: 15px;
    line-height: 1.4;
    }

    .opgave-display {
    font-size: 2.2rem;
    font-weight: bold;
    letter-spacing: 2px;
    user-select: none;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    }

    .number-group { display: flex; align-items: center; }

    .digit {
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 5px;
    transition: all 0.2s;
    border: 2px solid transparent;
    display: inline-block;
    }

    .digit:hover {
    background: #bbdefb;
    border-color: #90caf9;
    }

    .digit.selected {
    background: var(--secondary-color) !important;
    border-color: #ffa000 !important;
    }

    .comma-separator {
    color: #e53935;
    font-weight: 1000;
    padding: 0 4px;
    }

    /* Schema Stijl */
    #cijferSectie {
    display: none;
    margin-top: 20px;
    animation: slideDown 0.5s ease-out;
    }

    @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
    }

    .cijfer-table {
    margin: 0 auto;
    border-collapse: collapse;
    }

    .cijfer-table td {
    width: 48px;
    height: 48px;
    border: 1px solid var(--grid-border);
    position: relative;
    padding: 0;
    }

    /* Kolom Specifieke Achtergronden */
    .col-D { background-color: var(--color-D); }
    .col-H { background-color: var(--color-H); }
    .col-T { background-color: var(--color-T); }
    .col-E { background-color: var(--color-E); }
    .col-t { background-color: var(--color-t); }
    .col-h { background-color: var(--color-h); }

    /* Kommakolom Stijl */
    .comma-col {
    border: none !important;
    width: 16px !important;
    text-align: center;
    font-weight: 1000;
    font-size: 1.8rem;
    color: #e53935;
    user-select: none;
    }

    /* Onthoudrij Stijl (Cirkels) */
    .carry-row { height: 60px !important; }
    .carry-row td {    
    border: none !important;    
    vertical-align: middle;
    }
    .carry-row input {    
    width: 36px;    
    height: 36px;    
    border-radius: 50%;    
    border: 2px solid var(--grid-border);
    color: #e65100;    
    font-weight: bold;    
    font-size: 0.95rem;
    background: white;
    transition: border-color 0.2s;
    text-align: center;
    padding: 0;
    display: inline-block;
    }
    .carry-row input:focus {
    border-color: var(--primary-color);
    background: white;
    }

    .input-cell {
    width: 100%; height: 100%; border: none;
    text-align: center; font-size: 1.3rem;
    background: transparent; outline: none;
    font-weight: bold;
    }

    .input-cell:focus { background: rgba(255, 255, 255, 0.5); }
    .result-row { border-top: 3px solid #333; }
    .operator-cell { font-size: 1.5rem; font-weight: bold; border: none !important; width: 30px !important; }

    .btn-group { margin-top: 30px; display: flex; gap: 10px; justify-content: center; }

    button {
    padding: 12px 25px; font-size: 1rem;
    border: none; border-radius: 8px;
    cursor: pointer; transition: background 0.2s;
    }

    .btn-check { background: var(--success-color); color: white; }
    .btn-next { background: var(--primary-color); color: white; display: none; }

    #feedback { margin-top: 20px; font-weight: bold; min-height: 24px; }

    .stats-box {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 10px;
    margin: 20px 0;
    text-align: left;
    font-size: 1.1rem;
    }

    .correct-answer {
    color: var(--success-color);
    font-size: 1.2rem;
    margin-top: 5px;
    }
    </style>
</head>
<body>
<!-- LOGIN SCHERM -->
<div id="login-screen" style="position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#1565c0,#1976d2);display:flex;align-items:center;justify-content:center;padding:20px;">
  <div style="background:white;border-radius:24px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:0 25px 50px rgba(0,0,0,0.25);text-align:center;display:flex;flex-direction:column;gap:12px;">
    <div style="font-size:3rem">🔢</div>
    <h1 style="font-size:1.5rem;font-weight:900;color:#1f2937;margin:0;">Cijferen — Kommagetallen</h1>
    <p style="color:#6b7280;font-size:.9rem;margin:0;">Voer je naam en code in</p>
    <div id="klas-err" style="display:none;color:#dc2626;font-size:.85rem;font-weight:700;background:#fee2e2;border:1px solid #fca5a5;padding:8px 12px;border-radius:8px;"></div>
    <input type="text" id="klas-naam" placeholder="Jouw voornaam"
      style="width:100%;padding:14px;border:2px solid #e5e7eb;border-radius:12px;font-family:inherit;font-size:1rem;font-weight:600;text-align:center;outline:none;"
      autocomplete="off" autocapitalize="words">
    <input type="password" id="klas-code" placeholder="Jouw code"
      style="width:100%;padding:14px;border:2px solid #e5e7eb;border-radius:12px;font-family:inherit;font-size:1rem;font-weight:600;text-align:center;outline:none;"
      autocomplete="off">
    <button id="login-btn"
      style="width:100%;background:#1976d2;color:white;border:none;border-radius:12px;padding:14px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;">
      Inloggen
    </button>
    <button id="gast-btn"
      style="width:100%;background:transparent;border:2px solid #e5e7eb;border-radius:12px;padding:12px;font-family:inherit;font-size:.9rem;font-weight:700;color:#6b7280;cursor:pointer;">
      Doorgaan als gast (geen opslag)
    </button>
    <div style="font-size:.75rem;color:#9ca3af;">
      <a href="dashboard.html" style="color:#1976d2;font-weight:700;text-decoration:none;">Leerkracht? Klik hier</a>
    </div>
  </div>
</div>

<div id="mainContainer" style="display:none;">
<div class="container">

    <!-- Hartjes & Niveau Progressie -->
    <div id="progressContainer">
    <div id="niveauLabel">Gekozen niveau</div>
    <div id="progressSectie">
    <span class="heart" id="h1">♥</span>
    <span class="heart" id="h2">♥</span>
    <span class="heart" id="h3">♥</span>
    <span class="heart" id="h4">♥</span>
    <span class="heart" id="h5">♥</span>
    </div>
    </div>

    <!-- Hoofdmenu -->
    <div id="menuSectie">
    <h1>Wat wil je oefenen? (Kommagetallen)</h1>
    <button class="menu-btn" onclick="stelModusIn(1, 'Optellen zonder overschrijding')">➕ Optellen zonder overschrijding</button>
    <button class="menu-btn" onclick="stelModusIn(2, 'Optellen met overschrijding')">➕ Optellen met overschrijding</button>
    <button class="menu-btn" onclick="stelModusIn(3, 'Aftrekken zonder ontlenen')">➖ Aftrekken zonder ontlenen</button>
    <button class="menu-btn" onclick="stelModusIn(4, 'Aftrekken met ontlenen')">➖ Aftrekken met ontlenen</button>
    <button class="menu-btn" onclick="stelModusIn(5, 'Aftrekken met ontlenen (met nullen)')">➖ Aftrekken met ontlenen (met nullen)</button>
    <button class="menu-btn" onclick="stelModusIn(6, 'Alles door elkaar')">🔀 Alles door elkaar</button>
    </div>

    <!-- Oefenscherm -->
    <div id="oefeningSectie">
    <h1 id="oefeningTitel">Cijferen</h1>
    <div class="opgave-box">
    <div class="instruction" id="instructieTekst">
    Klik op de <b>eenheden</b> van beide getallen.
    </div>
    <div class="opgave-display" id="opgaveDisplay"></div>
    </div>

    <div id="cijferSectie">
    <table class="cijfer-table">
    <thead>
      <tr style="font-weight: bold; text-align: center; font-size: 0.85rem; color: #555; border: none;">
        <td style="border:none"></td>
        <td class="col-D" style="border:none">D</td>
        <td class="col-H" style="border:none">H</td>
        <td class="col-T" style="border:none">T</td>
        <td class="col-E" style="border:none">E</td>
        <td style="border:none; width: 16px;"></td>
        <td class="col-t" style="border:none">t</td>
        <td class="col-h" style="border:none">h</td>
      </tr>
    </thead>
    <!-- Onthoudrij (Cirkels voor Ijsbergrekenen) -->
    <tr class="carry-row">
    <td style="border:none"></td>
    <td class="col-D"><input type="text" maxlength="2" class="carry-input" id="carryD"></td>
    <td class="col-H"><input type="text" maxlength="2" class="carry-input" id="carryH"></td>
    <td class="col-T"><input type="text" maxlength="2" class="carry-input" id="carryT"></td>
    <td class="col-E"><input type="text" maxlength="2" class="carry-input" id="carryE"></td>
    <td class="comma-col" style="opacity: 0;">,</td>
    <td class="col-t"><input type="text" maxlength="2" class="carry-input" id="carry_t"></td>
    <td class="col-h"><input type="text" maxlength="2" class="carry-input" id="carry_h"></td>
    </tr>
    <tr>
    <td class="operator-cell"></td>
    <td class="col-D"><input type="text" maxlength="1" class="input-cell" id="r1D"></td>
    <td class="col-H"><input type="text" maxlength="1" class="input-cell" id="r1H"></td>
    <td class="col-T"><input type="text" maxlength="1" class="input-cell" id="r1T"></td>
    <td class="col-E"><input type="text" maxlength="1" class="input-cell" id="r1E"></td>
    <td class="comma-col">,</td>
    <td class="col-t"><input type="text" maxlength="1" class="input-cell" id="r1_t"></td>
    <td class="col-h"><input type="text" maxlength="1" class="input-cell" id="r1_h"></td>
    </tr>
    <tr>
    <td class="operator-cell" id="opTeken">+</td>
    <td class="col-D"><input type="text" maxlength="1" class="input-cell" id="r2D"></td>
    <td class="col-H"><input type="text" maxlength="1" class="input-cell" id="r2H"></td>
    <td class="col-T"><input type="text" maxlength="1" class="input-cell" id="r2T"></td>
    <td class="col-E"><input type="text" maxlength="1" class="input-cell" id="r2E"></td>
    <td class="comma-col">,</td>
    <td class="col-t"><input type="text" maxlength="1" class="input-cell" id="r2_t"></td>
    <td class="col-h"><input type="text" maxlength="1" class="input-cell" id="r2_h"></td>
    </tr>
    <tr class="result-row">
    <td style="border:none"></td>
    <td class="col-D"><input type="text" maxlength="1" class="input-cell" id="ansD"></td>
    <td class="col-H"><input type="text" maxlength="1" class="input-cell" id="ansH"></td>
    <td class="col-T"><input type="text" maxlength="1" class="input-cell" id="ansT"></td>
    <td class="col-E"><input type="text" maxlength="1" class="input-cell" id="ansE"></td>
    <td class="comma-col">,</td>
    <td class="col-t"><input type="text" maxlength="1" class="input-cell" id="ans_t"></td>
    <td class="col-h"><input type="text" maxlength="1" class="input-cell" id="ans_h"></td>
    </tr>
    </table>

    <div id="feedback"></div>

    <div class="btn-group">
    <button class="btn-check" id="btnCheck" onclick="valideerOplossing()">Nakijken</button>
    <button class="btn-next" id="btnNext" onclick="volgendeOefening()">Volgende oefening</button>
    </div>
    </div>
    </div>

    <!-- Eindscherm -->
    <div id="eindSectie">
    <h1>Goed gewerkt! 🌟</h1>
    <div class="stats-box" id="statsDisplay"></div>
    <!-- Upload status (style.display — nooit klassen wisselen) -->
    <div id="upload-status" style="display:none;padding:10px 16px;border-radius:10px;border:2px solid;font-size:.85rem;font-weight:700;text-align:center;margin-bottom:12px;">
      <span id="upload-spinner" style="display:inline-block;width:13px;height:13px;border:2px solid #e5e7eb;border-top-color:#1976d2;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;"></span>
      <span id="upload-status-text">Bezig met opslaan...</span>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <button class="menu-btn" style="text-align:center" onclick="stopOefening()">Terug naar menu</button>
    </div>
</div>

<script>
    let gekozenModus = 0;
    let gekozenLabel = "";
    let getal1, getal2, isPlus, eenheid1Gevonden, eenheid2Gevonden;
    
    // Statistieken
    let juisteOefeningen = 0;
    let fouteOefeningenInSessie = 0;
    let huidigeOefeningFoutGeweest = false;
    let startTime;

    function stelModusIn(modus, label) {
    gekozenModus = modus;
    gekozenLabel = label;
    juisteOefeningen = 0;
    fouteOefeningenInSessie = 0;
    startTime = new Date();
    window._vragenLog = []; // reset vragenlog voor nieuwe sessie
    
    document.getElementById('niveauLabel').innerText = label;
    document.getElementById('menuSectie').style.display = 'none';
    document.getElementById('eindSectie').style.display = 'none';
    document.getElementById('oefeningSectie').style.display = 'block';
    document.getElementById('progressContainer').style.display = 'flex';
    
    updateHearts();
    genereerSom();
    }

    function updateHearts() {
    for(let i=1; i<=5; i++) {
    document.getElementById('h'+i).classList.remove('filled');
    if(i <= juisteOefeningen) document.getElementById('h'+i).classList.add('filled');
    }
    }

    function stopOefening() {
    document.getElementById('menuSectie').style.display = 'flex';
    document.getElementById('oefeningSectie').style.display = 'none';
    document.getElementById('eindSectie').style.display = 'none';
    document.getElementById('progressContainer').style.display = 'none';
    }

    function toonEindscherm() {
    const endTime = new Date();
    const timeDiff = Math.floor((endTime - startTime) / 1000);
    const minuten = Math.floor(timeDiff / 60);
    const seconden = timeDiff % 60;
    const tijdStr = String(minuten).padStart(2,'0') + ':' + String(seconden).padStart(2,'0');

    document.getElementById('oefeningSectie').style.display = 'none';
    document.getElementById('eindSectie').style.display = 'flex';
    document.getElementById('progressContainer').style.display = 'none';

    document.getElementById('statsDisplay').innerHTML = `
    <p>📊 <b>Niveau:</b> ${gekozenLabel}</p>
    <p>⏱ <b>Tijd:</b> ${minuten}m ${seconden}s</p>
    <p>✅ <b>Juist:</b> ${juisteOefeningen}</p>
    <p>❌ <b>Fouten gemaakt:</b> ${fouteOefeningenInSessie}</p>
    `;

    // Reset upload-status
    document.getElementById('upload-status').style.display = 'none';
    document.getElementById('upload-status-text').textContent = 'Bezig met opslaan...';
    document.getElementById('upload-spinner').style.display = 'inline-block';

    // Enkel opslaan bij modus 6 (alles door elkaar = toets) of bij alle modi?
    // Opslaan bij ELKE afgeronde sessie (5 juist) voor een ingelogde leerling
    saveToFirestore(juisteOefeningen, 5, Math.round(juisteOefeningen/5*100), tijdStr, gekozenModus, gekozenLabel, fouteOefeningenInSessie, window._vragenLog || []);
    }

    function formatDutchDecimal(num) {
        return num.toFixed(2).replace('.', ',').replace(/,00$/, '').replace(/,(\d)0$/, ',$1');
    }

    function genereerSom() {
    eenheid1Gevonden = false;
    eenheid2Gevonden = false;
    huidigeOefeningFoutGeweest = false;
    
    let modus = gekozenModus === 6 ? Math.floor(Math.random() * 5) + 1 : gekozenModus;
    
    if (modus === 1) {
        // Optellen zonder overschrijding
        // We genereren de getallen zo dat de som per kolom < 10 is.
        // D, H, T, E, t, h
        let d1 = Math.floor(Math.random() * 5);
        let d2 = Math.floor(Math.random() * (5 - d1));
        
        let h1 = Math.floor(Math.random() * 5);
        let h2 = Math.floor(Math.random() * (10 - h1));
        
        let t1 = Math.floor(Math.random() * 5);
        let t2 = Math.floor(Math.random() * (10 - t1));
        
        let e1 = Math.floor(Math.random() * 8) + 1;
        let e2 = Math.floor(Math.random() * (10 - e1));
        
        // Tenminste één getal moet een kommagetal zijn
        let decSelection = Math.random() < 0.5 ? 1 : (Math.random() < 0.5 ? 2 : 3); // 1 = g1 heeft dec, 2 = g2 heeft dec, 3 = beide
        
        let tiende1 = (decSelection === 1 || decSelection === 3) ? Math.floor(Math.random() * 8) : 0;
        let tiende2 = (decSelection === 2 || decSelection === 3) ? Math.floor(Math.random() * (10 - tiende1)) : 0;
        
        let honderdste1 = (decSelection === 1 || decSelection === 3) ? Math.floor(Math.random() * 8) : 0;
        let honderdste2 = (decSelection === 2 || decSelection === 3) ? Math.floor(Math.random() * (10 - honderdste1)) : 0;
        
        // Zorg dat er tenminste één decimaal is
        if (tiende1 === 0 && tiende2 === 0 && honderdste1 === 0 && honderdste2 === 0) {
            tiende1 = 4;
            tiende2 = 3;
        }

        getal1 = parseFloat(`${d1*1000 + h1*100 + t1*10 + e1}.${tiende1}${honderdste1}`);
        getal2 = parseFloat(`${d2*1000 + h2*100 + t2*10 + e2}.${tiende2}${honderdste2}`);
        isPlus = true;

    } else if (modus === 2) {
        // Optellen met overschrijding
        let poging = 0;
        do {
            // Zorg voor minstens één kommagetal en mogelijke ongelijke decimalen
            let dec1 = Math.floor(Math.random() * 3); // 0, 1 of 2 decimalen
            let dec2 = Math.floor(Math.random() * 2) + 1; // 1 of 2 decimalen (altijd dec)
            getal1 = parseFloat((Math.random() * 8000 + 100).toFixed(dec1));
            getal2 = parseFloat((Math.random() * 1500 + 10).toFixed(dec2));
            poging++;
        } while (poging < 20 && !heeftOptelOverschrijding(getal1, getal2));
        isPlus = true;

    } else if (modus === 3) {
        // Aftrekken zonder ontlenen
        // We bouwen g1 en g2 zodanig dat d1 >= d2 voor elke kolom.
        let d1 = Math.floor(Math.random() * 8) + 1;
        let d2 = Math.floor(Math.random() * d1);
        
        let h1 = Math.floor(Math.random() * 9);
        let h2 = Math.floor(Math.random() * (h1 + 1));
        
        let t1 = Math.floor(Math.random() * 9);
        let t2 = Math.floor(Math.random() * (t1 + 1));
        
        let e1 = Math.floor(Math.random() * 8) + 1;
        let e2 = Math.floor(Math.random() * (e1 + 1));
        
        let decSelection = Math.random() < 0.5 ? 1 : (Math.random() < 0.5 ? 2 : 3);
        let tiende1 = (decSelection === 1 || decSelection === 3) ? Math.floor(Math.random() * 9) : 0;
        let tiende2 = (decSelection === 2 || decSelection === 3) ? Math.floor(Math.random() * (tiende1 + 1)) : 0;
        
        let honderdste1 = (decSelection === 1 || decSelection === 3) ? Math.floor(Math.random() * 9) : 0;
        let honderdste2 = (decSelection === 2 || decSelection === 3) ? Math.floor(Math.random() * (honderdste1 + 1)) : 0;
        
        if (tiende1 === 0 && tiende2 === 0 && honderdste1 === 0 && honderdste2 === 0) {
            tiende1 = 8;
            tiende2 = 3;
        }

        getal1 = parseFloat(`${d1*1000 + h1*100 + t1*10 + e1}.${tiende1}${honderdste1}`);
        getal2 = parseFloat(`${d2*1000 + h2*100 + t2*10 + e2}.${tiende2}${honderdste2}`);
        isPlus = false;

    } else if (modus === 4) {
        // Aftrekken met ontlenen (zonder specifieke nullen op g1)
        let poging = 0;
        do {
            let dec1 = Math.floor(Math.random() * 3);
            let dec2 = Math.floor(Math.random() * 2) + 1;
            getal1 = parseFloat((Math.random() * 7000 + 500).toFixed(dec1));
            getal2 = parseFloat((Math.random() * (getal1 - 100) + 10).toFixed(dec2));
            poging++;
        } while (poging < 20 && (!heeftAftrekOntlening(getal1, getal2) || getal1.toString().includes('0')));
        isPlus = false;

    } else if (modus === 5) {
        // Aftrekken met ontlenen (met nullen in g1)
        const templates = [
            { g1: 500, dec1: 0, g2Max: 120, dec2: 2 },
            { g1: 300.05, dec1: 2, g2Max: 98, dec2: 1 },
            { g1: 1000, dec1: 0, g2Max: 450, dec2: 2 },
            { g1: 604.02, dec1: 2, g2Max: 185, dec2: 2 },
            { g1: 800.3, dec1: 1, g2Max: 245, dec2: 2 }
        ];
        let t = templates[Math.floor(Math.random() * templates.length)];
        getal1 = t.g1;
        getal2 = parseFloat((Math.random() * t.g2Max + 15).toFixed(t.dec2));
        isPlus = false;
    }

    document.getElementById('cijferSectie').style.display = 'none';
    document.getElementById('btnCheck').style.display = 'inline-block';
    document.getElementById('btnNext').style.display = 'none';
    document.getElementById('instructieTekst').innerHTML = "Klik op de <b>eenheden</b> van beide getallen om te starten.";
    document.getElementById('feedback').innerHTML = "";
    document.getElementById('opTeken').innerText = isPlus ? "+" : "-";
    
    // Wis alle invoervelden
    document.querySelectorAll('input').forEach(el => {
    el.value = "";
    el.disabled = false;
    });

    renderOpgave();
    }

    // Helpers voor carry/borrow check
    function heeftOptelOverschrijding(g1, g2) {
        let s1 = g1.toFixed(2).replace('.', '');
        let s2 = g2.toFixed(2).replace('.', '');
        let maxLen = Math.max(s1.length, s2.length);
        s1 = s1.padStart(maxLen, '0');
        s2 = s2.padStart(maxLen, '0');
        let carry = 0;
        for (let i = maxLen - 1; i >= 0; i--) {
            let sum = parseInt(s1[i]) + parseInt(s2[i]) + carry;
            if (sum >= 10) return true;
            carry = Math.floor(sum / 10);
        }
        return false;
    }

    function heeftAftrekOntlening(g1, g2) {
        if (g1 <= g2) return false;
        let s1 = g1.toFixed(2).replace('.', '');
        let s2 = g2.toFixed(2).replace('.', '');
        let maxLen = Math.max(s1.length, s2.length);
        s1 = s1.padStart(maxLen, '0');
        s2 = s2.padStart(maxLen, '0');
        for (let i = maxLen - 1; i >= 0; i--) {
            if (parseInt(s1[i]) < parseInt(s2[i])) return true;
        }
        return false;
    }

    function renderOpgave() {
    const display = document.getElementById('opgaveDisplay');
    display.innerHTML = "";

    const createGroup = (num, id) => {
    const group = document.createElement('div');
    group.className = 'number-group';
    const s = formatDutchDecimal(num);
    const commaIdx = s.indexOf(',');
    // De eenheid is het cijfer net vóór de komma, of het laatste cijfer als er geen komma is.
    const unitIdx = commaIdx !== -1 ? commaIdx - 1 : s.length - 1;

    s.split('').forEach((c, i) => {
    const span = document.createElement('span');
    span.innerText = c;
    if (c === ',') {
        span.className = 'comma-separator';
        group.appendChild(span);
    } else {
        span.className = 'digit';
        span.onclick = function() {
        if (i === unitIdx) {
        this.classList.add('selected');
        if (id === 1) eenheid1Gevonden = true; else eenheid2Gevonden = true;
        if (eenheid1Gevonden && eenheid2Gevonden) activeerSchema();
        } else {
        this.style.borderColor = "var(--error-color)";
        setTimeout(() => this.style.borderColor = "transparent", 500);
        }
        };
        group.appendChild(span);
    }
    });
    return group;
    };

    display.appendChild(createGroup(getal1, 1));
    const op = document.createElement('span');
    op.innerText = isPlus ? "+" : "-";
    op.style.margin = "0 15px";
    display.appendChild(op);
    display.appendChild(createGroup(getal2, 2));
    const eq = document.createElement('span');
    eq.innerText = " = ?";
    eq.style.marginLeft = "10px";
    display.appendChild(eq);
    }

    function activeerSchema() {
    document.getElementById('cijferSectie').style.display = 'block';
    document.getElementById('instructieTekst').innerHTML = "<b>Goed zo!</b> Vul nu het schema in.";
    }

    function valideerOplossing() {
    const d = document.getElementById('ansD').value.trim() || "";
    const h = document.getElementById('ansH').value.trim() || "";
    const t = document.getElementById('ansT').value.trim() || "";
    const e = document.getElementById('ansE').value.trim() || "";
    const tienden = document.getElementById('ans_t').value.trim() || "";
    const honderdsten = document.getElementById('ans_h').value.trim() || "";
    
    if (e === "" && tienden === "" && honderdsten === "") {
    document.getElementById('feedback').innerText = "Vul eerst het antwoord in!";
    return;
    }

    // Bouw de invoer om naar een float kommagetal
    const intPart = (d || "0") + (h || "0") + (t || "0") + (e || "0");
    const decPart = (tienden || "0") + (honderdsten || "0");
    const gok = parseFloat(intPart + "." + decPart);

    const correct = isPlus ? (getal1 + getal2) : (getal1 - getal2);
    
    // Vergelijk afgerond tot 2 decimalen om float precision issues te voorkomen
    const roundedCorrect = Math.round(correct * 100) / 100;
    const roundedGok = Math.round(gok * 100) / 100;

    const fb = document.getElementById('feedback');

    if (roundedGok === roundedCorrect) {
    juisteOefeningen++;
    updateHearts();
    fb.innerHTML = "<span style='color:var(--success-color)'>🎉 Helemaal juist!</span>";
    if (!window._vragenLog) window._vragenLog = [];
    window._vragenLog.push({ vraag: formatDutchDecimal(getal1)+" "+(isPlus?"+":"-")+" "+formatDutchDecimal(getal2), antwoord: formatDutchDecimal(roundedGok), juist: formatDutchDecimal(roundedCorrect), isJuist: true });
    
    document.getElementById('btnCheck').style.display = 'none';
    document.getElementById('btnNext').style.display = 'inline-block';

    } else {
    if(!huidigeOefeningFoutGeweest) {
    fouteOefeningenInSessie++;
    huidigeOefeningFoutGeweest = true;
    }
    if (!window._vragenLog) window._vragenLog = [];
    window._vragenLog.push({ vraag: formatDutchDecimal(getal1)+" "+(isPlus?"+":"-")+" "+formatDutchDecimal(getal2), antwoord: formatDutchDecimal(roundedGok), juist: formatDutchDecimal(roundedCorrect), isJuist: false });
    
    fb.innerHTML = `
    <div style='color:var(--error-color)'>❌ Dat is niet juist.</div>
    <div class='correct-answer'>De juiste oplossing is: <b>${formatDutchDecimal(correct)}</b></div>
    `;
    
    // Blokkeer input na fout om verwarring te voorkomen
    document.querySelectorAll('.input-cell').forEach(el => el.disabled = true);
    
    document.getElementById('btnCheck').style.display = 'none';
    document.getElementById('btnNext').style.display = 'inline-block';
    }
    }

    function volgendeOefening() {
    if (juisteOefeningen >= 5) {
    toonEindscherm();
    } else {
    genereerSom();
    }
    }
</script>

<script>
firebase.initializeApp({

});
var _db          = firebase.firestore();
var _currentUser = null;
var _isGuest     = false;
var COL_NAME     = "cijferen_komma_toets"; // dashboard pikt dit automatisch op via registry

// ── UPLOAD STATUS ──────────────────────────────────────────────────────────
function setUploadStatus(type, msg) {
  var box     = document.getElementById("upload-status");
  var text    = document.getElementById("upload-status-text");
  var spinner = document.getElementById("upload-spinner");
  box.style.display    = "block";
  spinner.style.display = (type === "loading") ? "inline-block" : "none";
  if (type === "loading") {
    box.style.background  = "#f8fafc";
    box.style.borderColor = "#cbd5e1";
    box.style.color       = "#475569";
  } else if (type === "ok") {
    box.style.background  = "#f0fdf4";
    box.style.borderColor = "#86efac";
    box.style.color       = "#15803d";
  } else {
    box.style.background  = "#fff1f2";
    box.style.borderColor = "#fecdd3";
    box.style.color       = "#be123c";
  }
  text.textContent = msg;
  console.log("[cijferen saveToFirestore] " + type + ": " + msg);
}

// ── LOGIN ──────────────────────────────────────────────────────────────────
function klasLogin() {
  var naam = (document.getElementById("klas-naam").value||"").trim().toLowerCase();
  var code = (document.getElementById("klas-code").value||"").trim();
  var err  = document.getElementById("klas-err");
  err.style.display = "none";
  if (!naam) { err.textContent = "Vul je voornaam in."; err.style.display = "block"; return; }
  if (!code) { err.textContent = "Vul je code in.";    err.style.display = "block"; return; }

  var btn = document.getElementById("login-btn");
  btn.textContent = "Even wachten..."; btn.disabled = true;

  _db.collection("leerlingen").doc(naam).get().then(function(doc) {
    btn.textContent = "Inloggen"; btn.disabled = false;
    if (!doc.exists) { err.textContent = "Naam niet gevonden."; err.style.display = "block"; return; }
    var data = doc.data();
    if (data.code !== code) { err.textContent = "Verkeerde code."; err.style.display = "block"; return; }
    window._leerlingNaam = data.weergavenaam || naam;
    window._leerlingId   = naam;
    _currentUser = { uid: naam, displayName: data.weergavenaam || naam };
    _isGuest = false;
    openApp(_currentUser.displayName, false);
  }).catch(function(e) {
    btn.textContent = "Inloggen"; btn.disabled = false;
    err.textContent = "Fout: " + e.message; err.style.display = "block";
  });
}

function klasGast() {
  _isGuest = true; _currentUser = null;
  window._leerlingId   = null;
  window._leerlingNaam = "Gast";
  openApp("Gast", true);
}

function openApp(naam, isGast) {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("mainContainer").style.display = "block";
}

function doSignOut() {
  _currentUser = null; _isGuest = false;
  window._leerlingId = null; window._leerlingNaam = null;
  document.getElementById("mainContainer").style.display = "none";
  document.getElementById("login-screen").style.display  = "flex";
  document.getElementById("klas-naam").value = "";

  document.getElementById('menuSectie').style.display = 'flex';

// ── OPSLAAN NAAR FIRESTORE + REGISTRY ─────────────────────────────────────
// De registry-write zorgt ervoor dat het dashboard deze collection
// automatisch ontdekt — nooit meer manueel COLLECTION_LABELS aanpassen.
async function saveToFirestore(score, totalQ, pct, tijd, modus, label, fouten, vragenLog) {
  if (_isGuest || !_currentUser) {
    setUploadStatus("error", "❌ Niet opgeslagen: je speelt als gast.");
    return;
  }
  if (!window._leerlingId) {
    setUploadStatus("error", "❌ Geen leerling-ID. Log opnieuw in.");
    return;
  }

  setUploadStatus("loading", "Bezig met opslaan...");

  var modusLabels = {
    1:"Optellen zonder overschrijding",
    2:"Optellen met overschrijding",
    3:"Aftrekken zonder ontlenen",
    4:"Aftrekken met ontlenen",
    5:"Aftrekken met ontlenen (nullen)",
    6:"Alles door elkaar"
  };
  var modusNaam = modusLabels[modus] || label;

  var foutenTelling = fouten > 0 ? { [modusNaam]: fouten } : {};
  var extraOefenen  = fouten > 0 ? [modusNaam + " (" + fouten + "x fout)"] : [];

  var record = {
    leerlingId:   window._leerlingId,
    leerlingNaam: window._leerlingNaam || "Leerling",
    mode:         modusNaam,
    score:        score,
    totalQ:       totalQ,
    percentage:   pct,
    tijd:         tijd,
    hintsGebruikt: 0,
    timestamp:    firebase.firestore.FieldValue.serverTimestamp(),
    foutenAnalyse: {
      extraOefenen:       extraOefenen,
      foutenPerCategorie: foutenTelling
    },
    vragen: (vragenLog||[]).map(function(v, i) {
      return {
        vraagNr:          i + 1,
        vraag:            v.vraag            || "",
        categorie:        modusNaam,
        antwoordLeerling: v.antwoord         || "(leeg)",
        juistAntwoord:    v.juist            || "",
        isJuist:          v.isJuist          || false,
        hintGebruikt:     false,
        punten:           v.isJuist ? 1 : 0,
        tijdSeconden:     0
      };
    })
  };

  console.log("[cijferen saveToFirestore] Opslaan naar " + COL_NAME + ":", record);

  try {
    // 1. Score opslaan in eigen collection
    var docRef = await _db.collection(COL_NAME).add(record);
    console.log("[cijferen saveToFirestore] Succes! ID:", docRef.id);

    // 2. Registry bijwerken — dashboard leest dit en ontdekt de collection automatisch
    await _db.collection("toets_registry").doc(COL_NAME).set({
      naam:        "Cijferen (Kommagetallen)",
      collection:  COL_NAME,
      lastSeen:    firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });

    setUploadStatus("ok", "✅ Score opgeslagen! (ID: " + docRef.id.substring(0,8) + "…)");
  } catch(e) {
    console.error("[cijferen saveToFirestore] Fout:", e.code, e.message);
    var uitleg = e.message || "Onbekende fout";
    if (e.code === "permission-denied") uitleg = "Geen schrijfrechten. Contacteer de leerkracht.";
    else if (e.code === "unavailable")  uitleg = "Geen internetverbinding. Probeer opnieuw.";
    setUploadStatus("error", "❌ Opslaan mislukt: " + uitleg);
  }
}
