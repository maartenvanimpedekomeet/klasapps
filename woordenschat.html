<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Woordenschat Beheer — Meester</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --ink:    #1a1a2e;
      --paper:  #f5f0e8;
      --cream:  #ede8dc;
      --accent: #c84b31;
      --gold:   #e8a838;
      --green:  #2d6a4f;
      --muted:  #7a7060;
    }
    * { box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }
    h1,h2,h3,.syne { font-family: 'Syne', sans-serif; }

    /* LOGIN */
    #login-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--ink);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: var(--paper); border-radius: 20px;
      padding: 48px 40px; width: 360px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5); text-align: center;
    }
    .login-card h2 { font-size: 2rem; font-weight: 800; margin-bottom: 6px; }
    .login-card p  { color: var(--muted); font-size: .9rem; margin-bottom: 28px; }
    .login-card input {
      width: 100%; padding: 12px 16px; border: 2px solid var(--cream);
      border-radius: 10px; font-size: 1rem; background: white;
      margin-bottom: 12px; font-family: 'DM Sans', sans-serif; transition: border-color .2s;
    }
    .login-card input:focus { outline: none; border-color: var(--accent); }
    #login-error { color: var(--accent); font-size: .85rem; margin-top: 8px; min-height: 20px; }

    /* TOPBAR */
    #topbar {
      background: var(--ink); color: white;
      padding: 14px 32px;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    #topbar h1 { font-size: 1.25rem; font-weight: 800; }
    #topbar-sub { font-size: .8rem; color: rgba(255,255,255,.4); }

    /* BUTTONS */
    .btn-accent {
      background: var(--accent); color: white; border: none;
      border-radius: 10px; padding: 11px 22px; font-size: .95rem;
      font-weight: 700; cursor: pointer; font-family: 'Syne', sans-serif;
      transition: opacity .2s, transform .1s; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-accent:hover { opacity: .88; transform: translateY(-1px); }
    .btn-sm {
      background: rgba(255,255,255,.1); color: white;
      border: 1px solid rgba(255,255,255,.2); border-radius: 8px;
      padding: 6px 14px; font-size: .8rem; font-weight: 600;
      cursor: pointer; font-family: 'Syne', sans-serif; transition: background .2s;
    }
    .btn-sm:hover { background: rgba(255,255,255,.2); }
    .btn-icon {
      background: var(--cream); border: none; border-radius: 8px;
      padding: 7px 12px; cursor: pointer; font-size: .8rem; font-weight: 600;
      color: var(--muted); transition: all .2s;
      display: inline-flex; align-items: center; gap: 6px; font-family: 'DM Sans', sans-serif;
    }
    .btn-icon:hover { background: var(--ink); color: white; }
    .btn-icon.danger:hover { background: var(--accent); color: white; }
    .btn-icon.ai-btn { background: #e8f4ec; color: var(--green); }
    .btn-icon.ai-btn:hover { background: var(--green); color: white; }
    .btn-icon.ai-btn:disabled { opacity: .5; cursor: not-allowed; pointer-events: none; }

    /* MAIN */
    #main { max-width: 860px; margin: 0 auto; padding: 32px 20px 80px; }

    /* FILTER BAR */
    #filter-bar {
      display: flex; gap: 10px; margin-bottom: 24px;
      flex-wrap: wrap; align-items: center;
    }
    #zoek-input {
      flex: 1; min-width: 180px; padding: 10px 14px;
      border: 2px solid var(--cream); border-radius: 10px;
      font-size: .9rem; font-family: 'DM Sans', sans-serif;
      background: white; transition: border-color .2s;
    }
    #zoek-input:focus { outline: none; border-color: var(--gold); }
    #datum-filter {
      padding: 10px 14px; border: 2px solid var(--cream);
      border-radius: 10px; font-size: .85rem;
      font-family: 'DM Sans', sans-serif; background: white; cursor: pointer;
    }
    .stat-badge {
      background: white; border: 2px solid var(--cream);
      border-radius: 20px; padding: 6px 14px;
      font-size: .8rem; font-weight: 700; color: var(--muted);
      font-family: 'Syne', sans-serif;
    }

    /* ADD FORM */
    #add-form {
      background: white; border: 2px solid var(--cream);
      border-radius: 16px; padding: 22px; margin-bottom: 28px;
    }
    #add-form h2 {
      font-family: 'Syne', sans-serif; font-size: 1rem;
      font-weight: 800; color: var(--ink); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    @media(max-width:600px){ .field-row { grid-template-columns: 1fr; } }
    .field-group { display: flex; flex-direction: column; gap: 4px; }
    .field-group label {
      font-size: .7rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .07em;
    }
    .field-group input, .field-group textarea {
      border: 2px solid var(--cream); border-radius: 9px;
      padding: 9px 12px; font-size: .9rem;
      font-family: 'DM Sans', sans-serif; background: #fafafa;
      transition: border-color .2s; resize: none;
    }
    .field-group input:focus, .field-group textarea:focus {
      outline: none; border-color: var(--gold); background: white;
    }
    .field-group textarea { height: 68px; }
    #add-error { color: var(--accent); font-size: .82rem; margin-top: 6px; min-height: 18px; }

    /* AI MODAL */
    #ai-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      z-index: 600; display: none; align-items: center; justify-content: center;
    }
    #ai-modal-overlay.open { display: flex; }
    .ai-modal {
      background: white; border-radius: 18px; padding: 32px;
      max-width: 480px; width: 92%; box-shadow: 0 30px 60px rgba(0,0,0,.2);
    }
    .ai-modal h3 {
      font-family: 'Syne', sans-serif; font-size: 1.2rem;
      font-weight: 800; margin-bottom: 8px; color: var(--green);
    }
    .ai-modal .ai-result-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .ai-modal .ai-result-field label {
      font-size: .7rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .07em;
    }
    .ai-modal textarea {
      border: 2px solid var(--cream); border-radius: 9px;
      padding: 9px 12px; font-size: .9rem;
      font-family: 'DM Sans', sans-serif; resize: none; height: 72px;
      transition: border-color .2s;
    }
    .ai-modal textarea:focus { outline: none; border-color: var(--gold); }
    .ai-modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    .btn-cancel {
      background: var(--cream); border: none; border-radius: 8px;
      padding: 10px 18px; cursor: pointer; font-weight: 600;
      font-family: 'Syne', sans-serif; color: var(--ink);
    }
    #ai-spinner { text-align: center; padding: 24px; color: var(--green); }
    .spin { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* WOORD CARDS */
    .woord-card {
      background: white; border-radius: 14px;
      border: 2px solid var(--cream);
      padding: 18px 20px; margin-bottom: 12px;
      transition: border-color .2s, box-shadow .15s;
    }
    .woord-card:hover { border-color: #d4ccb8; box-shadow: 0 3px 12px rgba(0,0,0,.05); }
    .card-top {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 12px;
    }
    .woord-title {
      font-family: 'Syne', sans-serif; font-size: 1.25rem;
      font-weight: 800; color: var(--ink);
    }
    .woord-datum {
      font-size: .72rem; color: var(--muted); font-weight: 500; margin-top: 2px;
    }
    .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .card-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media(max-width:600px){ .card-fields { grid-template-columns: 1fr; } }
    .card-img-row {
      display: flex; gap: 12px; align-items: flex-start; margin-top: 10px;
    }
    .img-preview {
      width: 76px; height: 76px; border-radius: 10px;
      object-fit: cover; border: 2px solid var(--cream);
      cursor: pointer; flex-shrink: 0;
    }
    .img-broken {
      width: 76px; height: 76px; border-radius: 10px;
      border: 2px dashed #c8c0ae; background: var(--cream);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; color: var(--muted);
      font-size: .65rem; text-align: center; flex-shrink: 0; cursor: pointer;
    }
    .dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; margin-left: 6px; vertical-align: middle;
    }
    .dot-ok { background: var(--green); }
    .dot-fail { background: var(--accent); }
    .dot-wait { background: var(--gold); }

    /* DATE GROUPS */
    .datum-groep-label {
      font-family: 'Syne', sans-serif; font-size: .75rem; font-weight: 800;
      color: var(--muted); text-transform: uppercase; letter-spacing: .1em;
      padding: 4px 0 8px; border-bottom: 2px solid var(--cream);
      margin-bottom: 10px; margin-top: 24px;
    }

    /* CONFIRM MODAL */
    #confirm-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 700; display: none; align-items: center; justify-content: center;
    }
    #confirm-modal.open { display: flex; }
    .confirm-box {
      background: white; border-radius: 16px; padding: 30px;
      max-width: 380px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,.2);
    }
    .confirm-box h3 { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; margin-bottom:8px; }
    .confirm-box p { color:var(--muted); font-size:.9rem; margin-bottom:20px; }
    .confirm-btns { display:flex; gap:10px; justify-content:flex-end; }
    .btn-danger { background:var(--accent); color:white; border:none; border-radius:8px; padding:10px 18px; cursor:pointer; font-weight:700; font-family:'Syne',sans-serif; }

    /* SAVE TOAST */
    #save-toast {
      position: fixed; bottom: 22px; right: 22px;
      background: var(--green); color: white;
      padding: 10px 20px; border-radius: 30px; font-size: .85rem;
      font-weight: 700; display: none; align-items: center; gap: 8px;
      box-shadow: 0 6px 20px rgba(45,106,79,.35); z-index: 800;
      font-family: 'Syne', sans-serif;
    }

    .empty-state { text-align:center; padding:56px 20px; color:var(--muted); }
    .empty-state i { font-size:2.8rem; opacity:.3; display:block; margin-bottom:14px; }

    #version { position:fixed; bottom:6px; left:10px; font-size:.65rem; color:var(--muted); font-family:monospace; }
  </style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="login-overlay">
  <div class="login-card">
    <div style="font-size:2.5rem;margin-bottom:12px">📚</div>
    <h2>Woordenschat</h2>
    <p>Beheertool voor de meester</p>
    <input type="password" id="login-pw" placeholder="Wachtwoord">
    <button class="btn-accent" style="width:100%;justify-content:center;" onclick="doLogin()">
      <i class="fa-solid fa-right-to-bracket"></i> Inloggen
    </button>
    <div id="login-error"></div>
  </div>
</div>

<!-- TOPBAR -->
<div id="topbar">
  <div>
    <h1 class="syne">📚 Woordenschat Beheer</h1>
    <div id="topbar-sub">Laden…</div>
  </div>
  <button class="btn-sm" onclick="uitloggen()">
    <i class="fa-solid fa-right-from-bracket"></i> Uitloggen
  </button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- WOORD TOEVOEGEN -->
  <div id="add-form">
    <h2><i class="fa-solid fa-plus" style="color:var(--accent)"></i> Nieuw woord toevoegen</h2>
    <div class="field-row">
      <div class="field-group">
        <label>Woord *</label>
        <input type="text" id="new-woord" placeholder="bijv. absorberend" autocomplete="off">
      </div>
      <div class="field-group">
        <label>Afbeelding URL (optioneel)</label>
        <input type="url" id="new-img" placeholder="https://…">
      </div>
    </div>
    <div class="field-row">
      <div class="field-group">
        <label>Betekenis</label>
        <textarea id="new-betekenis" placeholder="Wat betekent dit woord?"></textarea>
      </div>
      <div class="field-group">
        <label>Voorbeeldzin</label>
        <textarea id="new-zin" placeholder="Een zin met het woord…"></textarea>
      </div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
      <button class="btn-icon ai-btn" id="ai-btn-new" onclick="openAiModal(null)">
        <i class="fa-solid fa-wand-magic-sparkles"></i> AI: genereer betekenis &amp; zin
      </button>
      <button class="btn-accent" onclick="voegWoordToe()">
        <i class="fa-solid fa-plus"></i> Toevoegen
      </button>
    </div>
    <div id="add-error"></div>
  </div>

  <!-- FILTER BAR -->
  <div id="filter-bar">
    <input type="text" id="zoek-input" placeholder="🔍  Zoek woord…" oninput="renderWoorden()">
    <select id="datum-filter" onchange="renderWoorden()">
      <option value="alles">Alle woorden</option>
      <option value="week">Laatste week</option>
      <option value="maand">Laatste maand</option>
    </select>
    <span class="stat-badge" id="count-badge">0 woorden</span>
  </div>

  <!-- WOORDENLIJST -->
  <div id="woorden-lijst"></div>

</div>

<!-- AI MODAL -->
<div id="ai-modal-overlay">
  <div class="ai-modal">
    <h3><i class="fa-solid fa-wand-magic-sparkles"></i> AI-assistent</h3>
    <div id="ai-modal-body">
      <div id="ai-spinner" style="display:none;">
        <i class="fa-solid fa-circle-notch spin" style="font-size:2rem;"></i>
        <p style="margin-top:10px;color:var(--muted);font-size:.9rem;">Betekenis genereren…</p>
      </div>
      <div id="ai-result" style="display:none;">
        <p style="font-size:.85rem;color:var(--muted);margin-bottom:14px;">
          Nakijken en aanpassen indien nodig, dan overnemen.
        </p>
        <div class="ai-result-field">
          <label>Betekenis</label>
          <textarea id="ai-bet-out"></textarea>
        </div>
        <div class="ai-result-field">
          <label>Voorbeeldzin</label>
          <textarea id="ai-zin-out"></textarea>
        </div>
      </div>
      <div id="ai-error" style="display:none;color:var(--accent);font-size:.9rem;padding:16px 0;"></div>
    </div>
    <div class="ai-modal-btns">
      <button class="btn-cancel" onclick="closeAiModal()">Annuleren</button>
      <button class="btn-accent" id="ai-overneem-btn" style="display:none;" onclick="neemAiOver()">
        <i class="fa-solid fa-check"></i> Overnemen
      </button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div id="confirm-modal">
  <div class="confirm-box">
    <h3 id="confirm-title">Bevestigen</h3>
    <p id="confirm-text">Ben je zeker?</p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Annuleren</button>
      <button class="btn-danger" onclick="confirmAction()">Verwijderen</button>
    </div>
  </div>
</div>

<!-- SAVE TOAST -->
<div id="save-toast"><i class="fa-solid fa-cloud-arrow-up"></i> Opgeslagen</div>

<div id="version">v0.2</div>

<script>
// ================================================================
// FIREBASE
// ================================================================
firebase.initializeApp({
  apiKey: "AIzaSyCnQDVVAlK6jE-PPUUediRJMTbN0xqrLDE",
  authDomain: "klaswebsite-database.firebaseapp.com",
  projectId: "klaswebsite-database"
});
var db = firebase.firestore();

// ================================================================
// STATE
// ================================================================
var WACHTWOORD = "meester2025";
var alleWoorden = [];   // [{id, woord, betekenis, zin, afbeelding, aangemaakt (Timestamp)}]
var confirmCb = null;
var aiDoelWoordId = null;  // null = nieuw woord formulier, anders card-id
var saveToastTimer = null;
var autoSaveTimers = {};

// ================================================================
// LOGIN
// ================================================================
document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("login-pw").addEventListener("keydown", function(e) {
    if (e.key === "Enter") doLogin();
  });
});

function doLogin() {
  var pw = document.getElementById("login-pw").value;
  if (pw === WACHTWOORD) {
    document.getElementById("login-overlay").style.display = "none";
    laadWoorden();
  } else {
    document.getElementById("login-error").textContent = "Verkeerd wachtwoord.";
  }
}

function uitloggen() {
  document.getElementById("login-overlay").style.display = "flex";
  document.getElementById("login-pw").value = "";
}

// ================================================================
// FIRESTORE
// ================================================================
function laadWoorden() {
  db.collection("woordenschat")
    .orderBy("aangemaakt", "desc")
    .onSnapshot(function(snap) {
      alleWoorden = [];
      snap.forEach(function(doc) {
        alleWoorden.push(Object.assign({ id: doc.id }, doc.data()));
      });
      renderWoorden();
      document.getElementById("topbar-sub").textContent =
        alleWoorden.length + " woorden opgeslagen";
    }, function(err) {
      console.error(err);
    });
}

function voegWoordToe() {
  var woord = document.getElementById("new-woord").value.trim();
  var errEl = document.getElementById("add-error");
  errEl.textContent = "";
  if (!woord) {
    errEl.textContent = "⚠ Vul een woord in.";
    document.getElementById("new-woord").focus();
    return;
  }
  var data = {
    woord: woord,
    betekenis: document.getElementById("new-betekenis").value.trim(),
    zin: document.getElementById("new-zin").value.trim(),
    afbeelding: document.getElementById("new-img").value.trim(),
    aangemaakt: firebase.firestore.FieldValue.serverTimestamp()
  };
  db.collection("woordenschat").add(data).then(function() {
    document.getElementById("new-woord").value = "";
    document.getElementById("new-betekenis").value = "";
    document.getElementById("new-zin").value = "";
    document.getElementById("new-img").value = "";
    document.getElementById("new-woord").focus();
    showToast();
  }).catch(function(e) {
    errEl.textContent = "Fout bij opslaan: " + e.message;
  });
}

function updateVeld(id, veld, waarde) {
  clearTimeout(autoSaveTimers[id + veld]);
  autoSaveTimers[id + veld] = setTimeout(function() {
    var upd = {};
    upd[veld] = waarde;
    db.collection("woordenschat").doc(id).update(upd).then(showToast);
  }, 900);
}

function verwijderWoord(id, naam) {
  openConfirm("Woord verwijderen",
    "Weet je zeker dat je \"" + naam + "\" wilt verwijderen?",
    function() {
      db.collection("woordenschat").doc(id).delete();
    });
}

// ================================================================
// RENDER
// ================================================================
function renderWoorden() {
  var zoek = (document.getElementById("zoek-input").value || "").toLowerCase();
  var filter = document.getElementById("datum-filter").value;
  var nu = Date.now();
  var DAG = 86400000;

  var lijst = alleWoorden.filter(function(w) {
    // Zoekfilter
    if (zoek && w.woord.toLowerCase().indexOf(zoek) === -1 &&
        (w.betekenis || "").toLowerCase().indexOf(zoek) === -1) return false;
    // Datumfilter
    if (filter !== "alles" && w.aangemaakt) {
      var ms = w.aangemaakt.toDate ? w.aangemaakt.toDate().getTime() : 0;
      if (filter === "week"  && nu - ms > 7  * DAG) return false;
      if (filter === "maand" && nu - ms > 30 * DAG) return false;
    }
    return true;
  });

  document.getElementById("count-badge").textContent = lijst.length + " woord" + (lijst.length !== 1 ? "en" : "");

  var container = document.getElementById("woorden-lijst");
  if (lijst.length === 0) {
    container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-book-open"></i><p>Geen woorden gevonden.</p></div>';
    return;
  }

  // Groepeer per datum
  var groepen = {};
  var groepVolgorde = [];
  lijst.forEach(function(w) {
    var key = "Onbekende datum";
    if (w.aangemaakt && w.aangemaakt.toDate) {
      var d = w.aangemaakt.toDate();
      key = d.toLocaleDateString("nl-BE", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
    }
    if (!groepen[key]) { groepen[key] = []; groepVolgorde.push(key); }
    groepen[key].push(w);
  });

  container.innerHTML = "";
  groepVolgorde.forEach(function(key) {
    var lbl = document.createElement("div");
    lbl.className = "datum-groep-label";
    lbl.textContent = key;
    container.appendChild(lbl);
    groepen[key].forEach(function(w) {
      container.appendChild(maakCard(w));
    });
  });
}

function maakCard(w) {
  var card = document.createElement("div");
  card.className = "woord-card";
  card.id = "card-" + w.id;

  var imgHtml = imgPreviewHtml(w);

  card.innerHTML =
    '<div class="card-top">' +
      '<div>' +
        '<div class="woord-title">' + escH(w.woord) + '</div>' +
        '<div class="woord-datum">' + datumTekst(w.aangemaakt) + '</div>' +
      '</div>' +
      '<div class="card-actions">' +
        '<button class="btn-icon ai-btn" onclick="openAiModal(\'' + w.id + '\')" title="AI: genereer betekenis &amp; zin">' +
          '<i class="fa-solid fa-wand-magic-sparkles"></i> AI</button>' +
        '<button class="btn-icon danger" onclick="verwijderWoord(\'' + w.id + '\',\'' + escH(w.woord) + '\')">' +
          '<i class="fa-solid fa-trash"></i></button>' +
      '</div>' +
    '</div>' +
    '<div class="card-fields">' +
      '<div class="field-group">' +
        '<label>Betekenis</label>' +
        '<textarea oninput="updateVeld(\'' + w.id + '\',\'betekenis\',this.value)">' + escH(w.betekenis || "") + '</textarea>' +
      '</div>' +
      '<div class="field-group">' +
        '<label>Voorbeeldzin</label>' +
        '<textarea oninput="updateVeld(\'' + w.id + '\',\'zin\',this.value)">' + escH(w.zin || "") + '</textarea>' +
      '</div>' +
    '</div>' +
    '<div class="card-img-row">' +
      imgHtml +
      '<div class="field-group" style="flex:1;">' +
        '<label>Afbeelding URL <span id="url-st-' + w.id + '"></span></label>' +
        '<input type="url" id="url-inp-' + w.id + '" value="' + escH(w.afbeelding || "") + '" ' +
          'placeholder="https://…" ' +
          'oninput="updateUrl(\'' + w.id + '\',this.value)">' +
      '</div>' +
    '</div>';

  return card;
}

function imgPreviewHtml(w) {
  if (!w.afbeelding) {
    return '<div class="img-broken" id="imgbox-' + w.id + '" onclick="focusUrl(\'' + w.id + '\')" title="Klik om URL toe te voegen">' +
      '<i class="fa-solid fa-image" style="font-size:1.4rem;opacity:.35;margin-bottom:4px;"></i>Geen foto</div>';
  }
  return '<img id="imgbox-' + w.id + '" src="' + escH(w.afbeelding) + '" class="img-preview" ' +
    'onerror="imgFout(\'' + w.id + '\')" onload="imgOk(\'' + w.id + '\')" ' +
    'onclick="focusUrl(\'' + w.id + '\')" title="Klik om URL aan te passen">';
}

function focusUrl(id) {
  var el = document.getElementById("url-inp-" + id);
  if (el) el.focus();
}

function imgOk(id) {
  var st = document.getElementById("url-st-" + id);
  if (st) st.innerHTML = '<span class="dot dot-ok" title="URL werkt"></span>';
}

function imgFout(id) {
  var st = document.getElementById("url-st-" + id);
  if (st) st.innerHTML = '<span class="dot dot-fail" title="URL werkt niet — pas aan"></span> <span style="color:var(--accent);font-size:.75rem;font-weight:600;">Link stuk</span>';
  var box = document.getElementById("imgbox-" + id);
  if (box && box.tagName === "IMG") {
    var ph = document.createElement("div");
    ph.className = "img-broken";
    ph.id = "imgbox-" + id;
    ph.title = "Klik om URL aan te passen";
    ph.onclick = (function(wid){ return function(){ focusUrl(wid); }; })(id);
    ph.innerHTML = '<i class="fa-solid fa-link-slash" style="font-size:1.3rem;color:var(--accent);opacity:.7;margin-bottom:4px;"></i>Link stuk';
    box.parentNode.replaceChild(ph, box);
  }
}

function updateUrl(id, url) {
  updateVeld(id, "afbeelding", url);
  var box = document.getElementById("imgbox-" + id);
  var st  = document.getElementById("url-st-" + id);
  if (!url) {
    var ph = document.createElement("div");
    ph.className = "img-broken";
    ph.id = "imgbox-" + id;
    ph.title = "Klik om URL toe te voegen";
    ph.onclick = (function(wid){ return function(){ focusUrl(wid); }; })(id);
    ph.innerHTML = '<i class="fa-solid fa-image" style="font-size:1.4rem;opacity:.35;margin-bottom:4px;"></i>Geen foto';
    if (box && box.parentNode) box.parentNode.replaceChild(ph, box);
    if (st) st.innerHTML = "";
    return;
  }
  var ni = document.createElement("img");
  ni.className = "img-preview";
  ni.id = "imgbox-" + id;
  ni.title = "Klik om URL aan te passen";
  ni.onclick = (function(wid){ return function(){ focusUrl(wid); }; })(id);
  ni.onerror = function(){ imgFout(id); };
  ni.onload  = function(){ imgOk(id); };
  ni.src = url;
  if (st) st.innerHTML = '<span class="dot dot-wait" title="Controleren…"></span>';
  if (box && box.parentNode) box.parentNode.replaceChild(ni, box);
}

// ================================================================
// AI MODAL  (via Claude artifact API — werkt enkel in claude.ai)
// ================================================================
function openAiModal(woordId) {
  aiDoelWoordId = woordId;
  var woordTekst = "";
  if (woordId === null) {
    woordTekst = document.getElementById("new-woord").value.trim();
    if (!woordTekst) {
      document.getElementById("add-error").textContent = "⚠ Vul eerst een woord in.";
      document.getElementById("new-woord").focus();
      return;
    }
    document.getElementById("add-error").textContent = "";
  } else {
    var obj = alleWoorden.find(function(w){ return w.id === woordId; });
    woordTekst = obj ? obj.woord : "";
  }

  // Reset modal
  document.getElementById("ai-spinner").style.display = "block";
  document.getElementById("ai-result").style.display = "none";
  document.getElementById("ai-error").style.display = "none";
  document.getElementById("ai-overneem-btn").style.display = "none";
  document.getElementById("ai-modal-overlay").classList.add("open");

  // API call
  fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: "Je bent een leerkracht buitengewoon onderwijs die eenvoudige woordverklaringen schrijft voor leerlingen van 11-13 jaar met leermoeilijkheden. Regels: gebruik KORTE zinnen (max 12 woorden), gebruik GEEN moeilijke woorden in je uitleg, wees concreet en beeldend. Antwoord ENKEL met geldige JSON, geen uitleg, geen markdown: {\"betekenis\": \"...\", \"zin\": \"...\"}",
      messages: [{ role: "user", content: "Geef een eenvoudige betekenis en een voorbeeldzin voor het woord: " + woordTekst }]
    })
  })
  .then(function(r) {
    if (!r.ok) return r.text().then(function(t){ throw new Error("HTTP " + r.status + ": " + t); });
    return r.json();
  })
  .then(function(data) {
    var tekst = "";
    if (data.content && data.content[0]) tekst = data.content[0].text || "";
    tekst = tekst.replace(/```json|```/g,"").trim();
    var parsed = JSON.parse(tekst);
    document.getElementById("ai-bet-out").value = parsed.betekenis || "";
    document.getElementById("ai-zin-out").value = parsed.zin || "";
    document.getElementById("ai-spinner").style.display = "none";
    document.getElementById("ai-result").style.display = "block";
    document.getElementById("ai-overneem-btn").style.display = "inline-flex";
  })
  .catch(function(e) {
    document.getElementById("ai-spinner").style.display = "none";
    document.getElementById("ai-error").textContent = "Kon geen AI-suggestie genereren. Fout: " + e.message;
    document.getElementById("ai-error").style.display = "block";
  });
}

function neemAiOver() {
  var bet = document.getElementById("ai-bet-out").value;
  var zin = document.getElementById("ai-zin-out").value;
  if (aiDoelWoordId === null) {
    document.getElementById("new-betekenis").value = bet;
    document.getElementById("new-zin").value = zin;
  } else {
    var ta = document.querySelector("#card-" + aiDoelWoordId + " .card-fields .field-group:first-child textarea");
    var tb = document.querySelector("#card-" + aiDoelWoordId + " .card-fields .field-group:last-child textarea");
    if (ta) { ta.value = bet; updateVeld(aiDoelWoordId, "betekenis", bet); }
    if (tb) { tb.value = zin; updateVeld(aiDoelWoordId, "zin", zin); }
  }
  closeAiModal();
}

function closeAiModal() {
  document.getElementById("ai-modal-overlay").classList.remove("open");
}

// ================================================================
// CONFIRM MODAL
// ================================================================
function openConfirm(titel, tekst, cb) {
  document.getElementById("confirm-title").textContent = titel;
  document.getElementById("confirm-text").textContent = tekst;
  confirmCb = cb;
  document.getElementById("confirm-modal").classList.add("open");
}
function closeConfirm() {
  document.getElementById("confirm-modal").classList.remove("open");
  confirmCb = null;
}
function confirmAction() {
  closeConfirm();
  if (confirmCb) confirmCb();
}

// ================================================================
// HELPERS
// ================================================================
function showToast() {
  var el = document.getElementById("save-toast");
  el.style.display = "flex";
  clearTimeout(saveToastTimer);
  saveToastTimer = setTimeout(function(){ el.style.display = "none"; }, 2200);
}

function datumTekst(ts) {
  if (!ts || !ts.toDate) return "";
  return ts.toDate().toLocaleDateString("nl-BE", {
    weekday:"long", day:"numeric", month:"long", year:"numeric"
  });
}

function escH(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
